id: game
label: "Game"
icon: Gamepad2
description: "Video game project — mechanics, art direction, and level design"
enabledDocs:
  - PRD
  - Design Document
  - Tech Stack
  - Architecture
  - Tech Spec
  - UI Design
  - Roadmap
  - Task List
  - Vibe Prompt

instructions:
  PRD: >
    generate a complete Game Design Document (GDD) for this video game.
    Focus on the core game loop, genre and gameplay pillars, target audience and player personas,
    game mechanics (movement, combat, progression, economy), narrative premise,
    art direction summary, audio design direction, platform targets (PC, console, mobile),
    monetization model (premium, F2P, DLC), multiplayer scope,
    and competitive landscape analysis.
  Design Document: >
    generate a complete Game Design Document covering detailed system design.
    Include core gameplay mechanics with pseudocode, game loop flow diagram,
    player progression system (XP, levels, skill trees, unlocks),
    economy design (currencies, crafting, loot tables, drop rates),
    AI behavior design (state machines, behavior trees), level design philosophy,
    difficulty scaling, save system architecture, and tutorial/onboarding flow.
  Tech Stack: >
    generate a complete Tech Stack Specification for a video game.
    Evaluate game engine (Unity/Unreal/Godot/custom), rendering pipeline,
    physics engine, networking solution (dedicated servers, P2P, relay),
    audio middleware (FMOD/Wwise), build pipeline and asset management,
    version control (Git LFS, Perforce), profiling tools,
    analytics SDK, and platform-specific SDK requirements.
  Architecture: >
    generate a complete Architecture Document for a video game.
    Cover game loop architecture (update/render cycle), Entity Component System (ECS) vs OOP,
    scene management and loading strategy, input system abstraction,
    networking architecture (client-server, rollback netcode, state sync),
    asset streaming and memory management, plugin/mod system design,
    and build/deployment pipeline per platform.
  Tech Spec: >
    generate a complete Technical Specification for a video game.
    Detail core systems implementation: player controller, camera system,
    combat/interaction system, inventory/equipment, quest/mission system,
    save/load serialization, localization pipeline, accessibility options,
    performance budgets (frame time, draw calls, memory), and platform certification requirements.
  UI Design: >
    generate a complete UI/UX Design Specification for a video game.
    Cover HUD design (health, minimap, objectives, notifications),
    menu system (main menu, pause, settings, inventory, map),
    in-game interaction prompts, dialogue/cutscene UI, shop/store UI,
    controller/touch input considerations, screen-safe zones,
    colorblind accessibility modes, subtitle system,
    and platform-specific UI guidelines (Xbox, PlayStation, Nintendo, Steam Deck).
  Roadmap: >
    generate a complete Project Roadmap for a video game.
    Structure into game development phases: Pre-Production (prototyping, vertical slice),
    Production (alpha build, feature-complete), Polish (beta, bug fixing, optimization),
    Certification/Submission, Launch, and Post-Launch (patches, DLC, live ops).
    Include milestone deliverables, team allocation, and QA test plans.
  Task List: >
    generate a comprehensive nested project task list for a video game.
    Structure as Phases → Milestones → Features → Tasks.
    Cover: engine setup and project scaffold, core mechanics prototype,
    art pipeline (modeling, texturing, animation), level creation,
    audio integration, UI implementation, networking,
    optimization passes, platform builds, QA testing rounds,
    certification requirements, and launch preparation.
  Vibe Prompt: >
    generate a comprehensive Vibe Ready Prompt for a video game —
    a master AI handoff document synthesizing ALL existing design documents
    into an actionable instruction file for an AI assistant.
    Include game identity (genre, pillars, unique hook), engine and tech stack,
    core systems brief, entity/component catalog, level structure,
    art and audio direction summary, phased build roadmap,
    coding conventions, and project file structure.
