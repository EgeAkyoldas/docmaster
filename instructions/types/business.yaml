id: business
label: "Business/Startup"
icon: TrendingUp
description: "Business plan, pitch deck foundation, and strategic roadmap"
enabledDocs:
  - PRD
  - Design Document
  - Roadmap
  - Task List
  - Vibe Prompt

instructions:
  PRD: >
    generate a complete Product Requirements Document (PRD) for this business/startup.
    Focus on market opportunity and TAM/SAM/SOM analysis, customer segments and personas,
    problem-solution fit, value proposition canvas, competitive landscape and differentiation,
    business model (SaaS, marketplace, subscription tiers, freemium),
    revenue projections framework, key partnerships and channels,
    regulatory considerations, and success metrics (CAC, LTV, MRR, churn rate).
  Design Document: >
    generate a complete Design Document for this business/startup.
    Cover the business architecture: operational workflows, customer journey maps,
    service blueprints, data flow between departments/systems,
    decision on build vs buy for key systems, vendor evaluation criteria,
    scalability of business processes, key automation opportunities,
    and technology-enabled competitive moats.
  Roadmap: >
    generate a complete Project Roadmap for this business/startup.
    Structure into: Validation Phase (customer discovery, problem interviews, MVP definition),
    Build Phase (core product, founding team, initial funding),
    Launch Phase (go-to-market, early adopter acquisition, feedback loops),
    Growth Phase (scaling, Series A readiness, team expansion).
    Include OKR framework, funding milestones, and key decision gates.
  Task List: >
    generate a comprehensive nested task list for this business/startup.
    Structure as Phases → Workstreams → Deliverables → Tasks.
    Cover: market research and validation, business model canvas,
    pitch deck creation, financial modeling, legal entity setup,
    MVP development, brand identity, marketing strategy,
    customer acquisition pipeline, investor outreach,
    team hiring plan, and operational setup.
  Vibe Prompt: >
    generate a comprehensive Vibe Ready Prompt for this business/startup —
    a master AI handoff document synthesizing ALL existing business documents.
    Include business identity (mission, vision, values), market analysis summary,
    business model brief, customer persona snapshots, competitive positioning,
    product roadmap overview, key metrics dashboard definition,
    and strategic priorities for the next 90 days.
