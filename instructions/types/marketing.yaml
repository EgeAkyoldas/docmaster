id: marketing
label: "Marketing Site"
icon: Megaphone
description: "Landing page, marketing website, or promotional platform"
enabledDocs:
  - PRD
  - UI Design
  - Tech Stack
  - Roadmap
  - Task List
  - Vibe Prompt

instructions:
  PRD: >
    generate a complete Product Requirements Document (PRD) for this marketing site.
    Focus on campaign objectives and conversion goals, target audience segments,
    key messaging and value propositions, page structure (hero, features, social proof,
    pricing, CTA sections), SEO strategy and target keywords,
    lead capture and CRM integration requirements, A/B testing plan,
    analytics and attribution tracking (UTM, pixel events),
    content management needs (blog, case studies, changelog),
    and performance targets (Core Web Vitals, LCP < 2.5s).
  UI Design: >
    generate a complete UI/UX Design Specification for this marketing site.
    Define the visual identity: hero section with value prop and CTA,
    feature showcase layouts (grid, bento, alternating),
    social proof sections (testimonials, logos, case studies, metrics),
    pricing table design (comparison, toggle annual/monthly, highlighted tier),
    footer with navigation and newsletter signup,
    animation strategy (scroll-triggered, parallax, micro-interactions),
    responsive strategy (mobile-first, breakpoints),
    dark/light theme, above-the-fold optimization,
    and conversion-focused CTA hierarchy with visual weight.
  Tech Stack: >
    generate a complete Tech Stack Specification for this marketing site.
    Evaluate static-site/SSG approach (Next.js/Astro/Nuxt) vs headless CMS,
    hosting (Vercel/Netlify/Cloudflare Pages), CMS for content editors
    (Sanity/Contentful/Keystatic/MDX), form handling (Formspree/Resend),
    analytics stack (Plausible/PostHog/GA4), A/B testing tool,
    image optimization (sharp, next/image, Cloudinary),
    SEO tooling (sitemap, robots.txt, structured data), email service,
    and performance monitoring.
  Roadmap: >
    generate a complete Project Roadmap for this marketing site.
    Structure into: Design Phase (brand identity, wireframes, copy writing),
    Build Phase (page templates, CMS setup, integrations),
    Content Phase (copywriting, imagery, SEO optimization),
    Launch Phase (DNS, SSL, analytics verification, SEO submission),
    and Iteration Phase (A/B tests, content pipeline, performance tuning).
    Include timeline with hard deadlines if applicable.
  Task List: >
    generate a comprehensive nested task list for this marketing site.
    Structure as Phases → Sections → Tasks.
    Cover: domain and hosting setup, design system/brand kit,
    hero section implementation, feature pages, pricing page,
    blog/changelog setup, CMS integration, form handling,
    SEO optimization (meta tags, OG images, structured data, sitemap),
    analytics setup, performance optimization (lazy loading, image optimization),
    cross-browser testing, mobile testing, and launch checklist.
  Vibe Prompt: >
    generate a comprehensive Vibe Ready Prompt for this marketing site —
    a master AI handoff document synthesizing ALL project documents.
    Include site identity (brand, messaging, target audience),
    page-by-page structure with copy direction, tech stack summary,
    CMS content model, SEO requirements, performance targets,
    conversion goals, and deployment instructions.
