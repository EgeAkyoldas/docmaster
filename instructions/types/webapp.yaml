id: webapp
label: "Web/Mobile App"
icon: Monitor
description: "Full-stack web or mobile application with API, database, and UI"
enabledDocs:
  - PRD
  - Design Document
  - Tech Stack
  - Architecture
  - Tech Spec
  - API Spec
  - UI Design
  - Data Model
  - Security Spec
  - Roadmap
  - Task List
  - Vibe Prompt

instructions:
  PRD: >
    generate a complete Product Requirements Document (PRD) for this web/mobile application.
    Focus on user personas, core user flows, feature prioritization (MoSCoW),
    success metrics and KPIs, platform scope (web, iOS, Android, PWA),
    integration requirements, and go-to-market considerations.
  Design Document: >
    generate a complete Design Document covering system design for a web/mobile application.
    Include architectural trade-offs (monolith vs microservices, SSR vs SPA vs hybrid),
    caching strategy, CDN considerations, data flow diagrams,
    third-party service integrations (payments, auth, analytics),
    and deployment topology.
  Tech Stack: >
    generate a complete Tech Stack Specification for a web/mobile application.
    Evaluate frontend framework (React/Next.js/Vue/Svelte), backend runtime (Node/Python/Go),
    database choice (PostgreSQL/MongoDB/Supabase), ORM/query builder,
    authentication provider (Clerk/Auth0/Firebase Auth), hosting platform (Vercel/AWS/Railway),
    state management, CI/CD pipeline, and monitoring tools with rationale for each choice.
  Architecture: >
    generate a complete Architecture Document using the C4 model for a web/mobile application.
    Cover system context, container diagram (frontend, API, database, cache, CDN),
    component diagrams for core modules, deployment architecture,
    scaling strategy (horizontal/vertical), and fault tolerance patterns.
  Tech Spec: >
    generate a complete Technical Specification as an implementation blueprint for a web/mobile app.
    Detail core data models with TypeScript interfaces, API route signatures,
    business logic rules, validation schemas (Zod/Yup), error handling strategy,
    middleware pipeline, background job processing, and real-time features (WebSocket/SSE).
  API Spec: >
    generate a complete API Specification for a web/mobile application.
    Define RESTful endpoints (or GraphQL schema) with request/response types,
    authentication flows (JWT/OAuth2), rate limiting rules, pagination strategy,
    webhook integrations, API versioning approach, and OpenAPI/Swagger documentation plan.
  UI Design: >
    generate a complete UI/UX Design Specification for a web/mobile application.
    Include design philosophy, responsive breakpoint strategy, color system with dark/light modes,
    typography scale, component library (buttons, forms, modals, navigation),
    page layouts with wireframe descriptions, micro-interactions,
    loading states, empty states, and accessibility (WCAG 2.1 AA) compliance plan.
  Data Model: >
    generate a complete Data Model Specification for a web/mobile application.
    Define all entities (Users, Organizations, Resources) with field types and constraints,
    relationships (1:1, 1:N, M:N with junction tables), indexing strategy for query patterns,
    soft delete vs hard delete policy, audit trail fields (createdAt, updatedAt, deletedAt),
    migration plan, and seed data strategy.
  Security Spec: >
    generate a complete Security Specification for a web/mobile application.
    Cover authentication model (OAuth2/OIDC/magic links), authorization (RBAC/ABAC),
    OWASP Top 10 mitigations (XSS, CSRF, SQL Injection, SSRF),
    data encryption (at rest with AES-256, in transit with TLS 1.3),
    Content Security Policy headers, rate limiting,
    GDPR/CCPA compliance plan, and incident response procedures.
  Roadmap: >
    generate a complete Project Roadmap for a web/mobile application.
    Structure into phases: MVP (core auth + primary feature), Beta (secondary features + polish),
    Launch (production hardening + monitoring), and Post-Launch (iteration + scaling).
    Include timeline estimates, team allocation, dependency mapping, and launch criteria.
  Task List: >
    generate a comprehensive nested project task list for a web/mobile application.
    Structure as Phases → Epics → Stories → Tasks.
    Cover: project setup (repo, CI/CD, env), database schema + migrations,
    authentication flow, core features, API development, frontend pages,
    testing (unit + integration + E2E), deployment pipeline, and documentation.
  Vibe Prompt: >
    generate a comprehensive Vibe Ready Prompt for a web/mobile application —
    a master AI handoff document that synthesizes ALL existing project documents
    into a single actionable instruction file for an AI coding assistant.
    Include project identity, tech stack snapshot, architecture brief,
    core data models, API routes, phased implementation roadmap,
    development rules, expected file structure, and bootstrap commands.
